{% extends "base.html" %}

{% block content %}
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2 class="text-success border-bottom pb-2">
                Tareas Completadas ✅
            </h2>

            <div class="list-group mt-4">
                {% for tarea in tareas %}
                    <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <div>
                            <span class="fw-bold text-dark text-decoration-line-through">{{ tarea.nombre }}</span>
                            <br>
                            <small class="text-muted">{{ tarea.descripcion|truncatechars:50 }}</small>
                        </div>
                        <span class="badge bg-success rounded-pill px-3">Completada</span>
                    </div>
                {% empty %}
                    <div class="alert alert-light border">
                        Aún no has terminado ninguna tarea. ¡Ánimo! 💪
                    </div>
                {% endfor %}
            </div>

            <div class="mt-4 d-flex gap-2">
                <a href="{% url 'task_list' %}" class="btn btn-secondary">
                    Volver al Inicio
                </a>
                <a href="{% url 'tareas_pendientes' %}" class="btn btn-outline-warning">
                    Ver Pendientes ⏳
                </a>
            </div>
        </div>
    </div>
{% endblock %}
