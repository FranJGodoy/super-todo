{% extends "base.html" %}

{% block content %}
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2 class="text-warning border-bottom pb-2">
                Tareas Pendientes ⏳
            </h2>

            <div class="list-group mt-4">
                {% for tarea in tareas %}
                    <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <div>
                            <span class="fw-bold text-dark">{{ tarea.nombre }}</span>
                            <br>
                            <small class="text-muted">{{ tarea.descripcion|truncatechars:50 }}</small>
                        </div>
                        <span class="badge bg-warning text-dark rounded-pill px-3">Pendiente</span>
                    </div>
                {% empty %}
                    <div class="alert alert-info">
                        No hay tareas pendientes. 🚀
                    </div>
                {% endfor %}
            </div>

            <div class="mt-4 d-flex gap-2">
                <a href="{% url 'task_list' %}" class="btn btn-secondary mt-3">
                    <i class="bi bi-arrow-left"></i> Volver al Inicio
                </a>
                <a href="{% url 'tareas_completadas' %}" class="btn btn-outline-success mt-3">
                    Ver tareas terminadas
                </a>
            </div>
        </div>
    </div>
{% endblock %}
