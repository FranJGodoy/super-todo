{% extends "base.html" %}
{% block content %}

<h2>{% if task %}Editar tarea{% else %}Nueva tarea{% endif %}</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="{% url 'task_list' %}" class="btn btn-secondary ms-2" title="Volver al inicio sin guardar">Cancelar</a>
</form>

{% endblock %}
